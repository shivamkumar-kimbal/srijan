function avatarOverlap(i){ return `width:28px;height:28px;border-radius:8px;background:${AV[i%AV.length]};color:#fff;display:flex;align-items:center;justify-content:center;font:700 11px 'Hanken Grotesk';border:2px solid #F7F7F5;margin-left:-7px;`; }

  </div>`;
}

//======================= MAIN RENDER =======================
function mainView(){
  switch(state.view){
    case 'board': return boardView();
    case 'detail': return detailView();
    case 'projects': return projectsView();
    case 'profile': return profileView();
    case 'insights': return insightsView();
    default: return boardView();
  }
}

function render(){
  const app=document.getElementById('app');
  app.innerHTML=`
  <div style="display:flex;height:100vh;width:100%;overflow:hidden;font-family:'Hanken Grotesk',sans-serif;background:#F7F7F5;color:#1C1B1A;">
    ${sidebar()}
    <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
      ${topbar()}
      <main style="flex:1;overflow-y:auto;">${mainView()}</main>
    </div>
  </div>`;
}

//======================= EVENTS =======================
const ACTIONS={
  goBoard:()=>setState({view:'board'}),
  goProjects:()=>setState({view:'projects'}),
  goProfile:()=>setState({view:'profile'}),
  goInsights:()=>setState({view:'insights'}),
  toggleForm:()=>setState({showForm:!state.showForm}),
  submitProposal:()=>setState({submitted:true, showForm:false})
};

document.addEventListener('click', e=>{
  const el=e.target.closest('[data-act]');
  if(!el) return;
  const act=el.dataset.act;
  if(act==='open'){ setState({view:'detail', selId:+el.dataset.id, showForm:false, submitted:false, pWhy:'', pExp:'', pHours:6}); return; }
  if(act==='filter'){ setState({filter:el.dataset.filter}); return; }
  if(ACTIONS[act]) ACTIONS[act]();
});

// preserve input state without full re-render losing focus
document.addEventListener('input', e=>{
  const el=e.target.closest('[data-field]');
  if(!el) return;
  const f=el.dataset.field;
  if(f==='pHours'){
    state.pHours=+el.value;
    const lbl=el.previousElementSibling && el.previousElementSibling.querySelector('span');
    if(lbl) lbl.textContent=state.pHours+' hrs/wk';
  } else {
    state[f]=el.value; // textareas: store silently, no re-render to keep focus
  }
});

render();
</script>
</body>
</html>
